name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  flutter-checks:
    name: Flutter Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies (root)
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Install dependencies (example)
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: flutter analyze
        working-directory: example
