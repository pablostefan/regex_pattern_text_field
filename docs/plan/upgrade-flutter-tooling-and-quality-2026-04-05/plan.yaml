plan_id: upgrade-flutter-tooling-and-quality-2026-04-05
objective: Upgrade package tooling to latest stable Flutter/Dart and improve code quality with minimal API breakage.
created_at: 2026-04-05
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 8
  risk_score: medium

tldr: |
  The revised plan starts with one consolidated research pass that produces concrete artifacts,
  then enforces an explicit decision gate to lock Flutter/Dart minimum baseline and release strategy
  before implementation. Conflicting implementation work has been sequenced into separate waves,
  performance work is now profile-first and conditional, and downstream handoffs use explicit artifact paths.
open_questions:
  - None. Baseline version and release strategy are explicitly locked in TASK-002 before implementation begins.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Decision gate is skipped and implementation starts with an ambiguous SDK floor.
      likelihood: medium
      impact: critical
      mitigation: Make TASK-002 a mandatory dependency for all implementation tasks and require a written decision record artifact.
    - scenario: Typed API hardening introduces subtle source incompatibilities.
      likelihood: medium
      impact: high
      mitigation: Use compatibility checklist artifact and deprecation-first migration path with tests covering legacy usage.
    - scenario: Performance optimization is applied without a verified bottleneck and causes behavioral drift.
      likelihood: medium
      impact: high
      mitigation: Require profile evidence in TASK-001 and execute TASK-005 code changes only when measurable bottleneck threshold is met.
  assumptions:
    - Repository remains a single Flutter package with one example app.
    - Release strategy can be decided within this plan cycle and documented before code edits.
    - Regression corpus and compatibility checklist artifacts are treated as required handoff inputs.

implementation_specification:
  code_structure: >-
    Keep current package structure under lib/ and example/ while adding planning artifacts under
    docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/. Implementation changes
    remain additive/deprecation-first and follow existing public export surfaces.
  affected_areas:
    - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/plan.yaml
    - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/
    - docs/PRD.yaml
    - pubspec.yaml
    - example/pubspec.yaml
    - analysis_options.yaml
    - lib/controllers/
    - lib/widgets/
    - lib/models/
    - test/
    - example/lib/main.dart
    - README.md
    - CHANGELOG.md
  component_details:
    - component: Research Baseline Pack
      responsibility: Generate authoritative compatibility, behavior, and profiling artifacts used by all downstream tasks.
      interfaces:
        - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/compatibility_checklist.md
        - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/regression_corpus.yaml
        - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/profile_baseline.md
    - component: Decision Gate
      responsibility: Lock minimum Flutter/Dart baseline, release strategy, and optimization go/no-go criteria.
      interfaces:
        - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/decision_record.md
    - component: Tooling and API Modernization
      responsibility: Apply locked tooling updates, deprecation remediation, and typed API migration-safe changes.
      interfaces:
        - Root/example pubspec and analyzer settings
        - Public model and callback signatures with deprecation notes
    - component: Conditional Performance Track
      responsibility: Apply performance refactor only when profile baseline proves measurable bottleneck.
      interfaces:
        - docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/performance_decision.md
        - Updated hot-path code only when go condition is true
    - component: Quality and Release Gate
      responsibility: Validate behavior and publish migration-ready docs after implementation.
      interfaces:
        - test/ suite updates
        - example/lib/main.dart
        - README.md
        - CHANGELOG.md
  dependencies:
    - component: Decision Gate
      relationship: Depends on Research Baseline Pack artifacts.
    - component: Tooling and API Modernization
      relationship: Depends on locked decisions from Decision Gate.
    - component: Conditional Performance Track
      relationship: Depends on Decision Gate criteria and modernized API/tooling baseline.
    - component: Quality and Release Gate
      relationship: Depends on completion (or explicit skip decision) of conditional performance track.
  integration_points:
    - Export surface in lib/regex_pattern_text_field.dart
    - Controller behavior in lib/controllers/regex_pattern_text_editing_controller.dart
    - Widget contracts in lib/widgets/regex_pattern_text_field.dart
    - Consumer guidance in README.md and example/lib/main.dart

