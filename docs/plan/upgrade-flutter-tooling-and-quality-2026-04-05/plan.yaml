  - from_task: TASK-002
    to_task: TASK-003
    interface: Locked minimum Flutter/Dart baseline and release strategy.
    format: docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/decision_record.md
  - from_task: TASK-002
    to_task: TASK-004
    interface: Locked API compatibility and deprecation policy constraints.
    format: docs/plan/upgrade-flutter-tooling-and-quality-2026-04-05/artifacts/decision_record.md
  - from_task: TASK-002
